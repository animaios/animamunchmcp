name: Quality Gates

# Standalone gates (separate from test.yml so PRs see this job pass/fail fast).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  large-file-check:
    name: "Large file check (<=500 KiB)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for oversized files
        run: |
          # Hard ceiling: 500 KiB. No exceptions — oversized files block the build.
          # Exemptions (append-only or auto-generated beyond authors' control):
          # - CHANGELOG.md (append-only historical record)
          # - uv.lock (auto-generated by uv)
          # - dead_code_audit_results*.json (generated data artifacts, 1.5 MiB)
          # - .github/workflows/* (CI files themselves)
          FAIL=0
          while IFS= read -r -d '' f; do
            case "$f" in
              CHANGELOG.md|uv.lock|dead_code_audit_results*.json|.github/workflows/*) continue ;;
            esac
            SIZE=$(wc -c < "$f")
            if [ "$SIZE" -gt 512000 ]; then
              echo "FAIL: $f is $SIZE bytes (>512000)"
              FAIL=1
            fi
          done < <(find . -type f -not -path './.git/*' -not -path './.ruff_cache/*' -print0)
          if [ "$FAIL" -eq 1 ]; then
            echo "One or more files exceed the 500 KiB limit. See above."
            exit 1
          fi
          echo "OK: every tracked file <= 512000 bytes."

  unused-deps-check:
    name: "Unused dependencies check (deptry)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.5"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev --extra watch

      - name: Install deptry
        run: uv pip install deptry

      - name: Run deptry
        # deptry 0.25.1 expects PIPE-separated packages in --per-rule-ignores
        # (comma-separated fails with ValueError). We ignore [extras]-only
        # deps (CLI/extra deps with no direct src/ imports) plus transitive-
        # only concerns. DEP001 and DEP003 are packaging concerns, not the
        # unused-dep signal we're tracking.
        run: uv run deptry src/ --per-rule-ignores "DEP002=anthropic|google-generativeai|openai|watchfiles|sentence-transformers|onnxruntime|sounddevice|numpy|Pillow|rich|jinja2|keyring|starlette|anyio" --ignore DEP001,DEP003

  dead-feature-flags-check:
    name: "Dead feature flags check (FF.*)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.6.5"

      - name: Count registered feature flags
        id: dead-flags-count
        # No registry → empty output; downstream step is skipped so CI passes.
        run: |
          COUNT=$(uv run python - <<'PY'
          import sys
          sys.path.insert(0, "src")
          from jcodemunch_mcp.feature_flags import KNOWN_FLAGS
          print(len(KNOWN_FLAGS))
          PY
          )
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "registered flags: $COUNT"

      - name: Run dead feature-flag detector
        id: dead-flags
        if: steps.dead-flags-count.outputs.count != '0'
        run: uv run python scripts/detect_dead_flags.py
